{% extends "base.html" %}
{% block fullpage %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>SIGACOOP</h1>
            <p>Sistema de Gestión de Asambleas</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
            <div class="form-group">
                <label for="nombre_usuario">Usuario</label>
                <input type="text" id="nombre_usuario" name="nombre_usuario" placeholder="Ingrese su usuario" required
                    autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Ingresar al Sistema</button>
        </form>
        <div class="login-footer">
            <p>Uso exclusivo para personal autorizado</p>
        </div>
    </div>
</div>
{% endblock %}
